services:
  - type: web
    name: phishing-detection-system
    env: python
    plan: starter
    
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn -w 4 -b 0.0.0.0:$PORT 
      --timeout 120 
      --access-logfile - 
      --error-logfile - 
      "app.app:create_app('production')"
    
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        scope: build,runtime
    
    healthCheckPath: /health
    
    disk:
      name: uploads
      mountPath: /var/uploads
      sizeGB: 10
    
    autoDeploy: true
  
  - type: pserv
    name: phishing-detection-db
    ipAllowList: []
    plan: starter
    maxConnections: 30
    postgresMajorVersion: 15
